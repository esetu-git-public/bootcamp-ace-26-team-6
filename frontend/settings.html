<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Compliance - Camera Settings</title>
    <script src="js/auth-guard.js?v=15"></script>
    <link rel="stylesheet" href="css/style.css?v=15">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        try {
            const session = localStorage.getItem("ppe_session");
            if (session) {
                const parsed = JSON.parse(session);
                const payload = JSON.parse(atob(parsed.access_token.split('.')[1]));
                if (Date.now() >= payload.exp * 1000) {
                    localStorage.removeItem("ppe_session");
                }
            }
        } catch (e) {
            localStorage.removeItem("ppe_session");
        }
    </script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-icon">
                    <i data-lucide="shield-alert" style="width: 22px; height: 22px;"></i>
                </div>
                <div class="logo-text">PPE Sentry</div>
            </div>
            <nav>
                <ul class="nav-links">
                    <li class="nav-item">
                        <a href="index.html">
                            <i data-lucide="layout-dashboard"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="logs.html">
                            <i data-lucide="clipboard-list"></i>
                            Violation Log
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="reports.html">
                            <i data-lucide="bar-chart-3"></i>
                            Reports
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="history.html">
                            <i data-lucide="calendar"></i>
                            History
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="settings.html">
                            <i data-lucide="settings"></i>
                            Cameras
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div id="supabase-status-badge" class="supabase-badge" style="margin-bottom: 0.75rem;">
                    <span class="indicator"></span>
                    <span id="supabase-status-label">Checking...</span>
                </div>
                <div class="sidebar-profile">
                    <div class="profile-avatar" id="user-avatar">??</div>
                    <div class="profile-details">
                        <span class="profile-name" id="user-display-name">Username</span>
                    </div>
                    <button class="logout-icon-btn" id="logout-btn" title="Sign Out">
                        <i data-lucide="log-out" style="width: 15px; height: 15px;"></i>
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <div class="page-title">
                    <h1>Camera Settings</h1>
                    <p>Manage your IP cameras and RTSP streams</p>
                </div>
                <div class="header-actions">
                    <button id="add-camera-btn" class="btn btn-primary">
                        <i data-lucide="plus"></i>
                        Add Camera
                    </button>
                </div>
            </header>

            <section class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <i data-lucide="video" style="color: var(--color-primary);"></i>
                        Configured Cameras
                    </h2>
                </div>
                <div class="table-responsive">
                    <table class="custom-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>URL</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="cameras-tbody">
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                                    Loading cameras...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Add/Edit Camera Modal -->
            <div id="camera-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content" style="max-width: 480px;">
                    <div class="modal-header">
                        <h3 id="camera-modal-title">Add Camera</h3>
                        <button class="modal-close-btn" id="camera-modal-close">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">Camera Name</label>
                            <input type="text" id="cam-name" class="form-input" placeholder="e.g. Entrance Gate">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Stream URL</label>
                            <input type="text" id="cam-url" class="form-input" placeholder="http://192.168.1.100:8080/video">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="camera-modal-cancel" class="btn btn-outline">Cancel</button>
                        <button id="camera-modal-save" class="btn btn-primary">Save</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/supabase-db.js?v=17"></script>
    <script src="js/settings.js?v=17"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>

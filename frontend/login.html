<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Compliance - Login</title>
    <!-- Sync Auth Guard to prevent layout flash if already logged in -->
    <script src="js/auth-guard.js?v=2"></script>
    <link rel="stylesheet" href="css/style.css?v=2">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Logo Header -->
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <i data-lucide="shield-check" style="width: 26px; height: 26px;"></i>
                </div>
                <div class="auth-logo-text">PPE Compliance</div>
                <div class="auth-logo-subtitle">Access Detection & Violations Monitor</div>
            </div>

            <!-- Error Alerts Banner -->
            <div class="auth-error-alert" id="auth-error-alert">
                <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
                <span id="error-message">Invalid email address or password.</span>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <input 
                        type="email" 
                        id="login-email" 
                        class="form-control" 
                        placeholder="name@company.com" 
                        required 
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group" style="margin-bottom: 1.75rem;">
                    <label class="form-label" for="login-password">Password</label>
                    <input 
                        type="password" 
                        id="login-password" 
                        class="form-control" 
                        placeholder="••••••••" 
                        required 
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem;">
                    <i data-lucide="log-in" style="width: 18px; height: 18px;"></i>
                    Sign In
                </button>
            </form>

            <!-- Redirect Link -->
            <div class="auth-footer-link">
                Don't have an account? <a href="register.html">Sign up here</a>
            </div>
            
            <!-- Default credentials tip for mock mode -->
            <div style="margin-top: 2rem; border-top: 1px dashed var(--border-color); padding-top: 1rem; font-size: 0.725rem; color: var(--text-muted); text-align: center;">
                <p style="font-weight: 600; margin-bottom: 0.25rem;">Default Demo Accounts:</p>
                <code style="display: block; background: rgba(255,255,255,0.03); padding: 0.25rem; border-radius: 4px; border: 1px solid var(--border-color); margin-top: 0.15rem;">
                    john.doe@company.com / password123 (Admin)<br>
                    jane.smith@company.com / password123 (Safety Officer)
                </code>
            </div>
        </div>
    </div>

    <!-- Script integrations -->
    <script src="js/supabase-db.js?v=2"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Render Lucide icons
            lucide.createIcons();

            const form = document.getElementById("login-form");
            const alertBox = document.getElementById("auth-error-alert");
            const errorMsg = document.getElementById("error-message");

            form.onsubmit = async (e) => {
                e.preventDefault();
                
                const email = document.getElementById("login-email").value.trim();
                const password = document.getElementById("login-password").value;
                const submitBtn = form.querySelector("button[type='submit']");

                // Toggle loading state
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<span class="loading-spinner" style="width: 14px; height: 14px; border-width: 2px;"></span> Verifying...`;
                alertBox.classList.remove("visible");

                try {
                    await signInUser(email, password);
                    // On success, redirect to dashboard
                    window.location.href = "index.html";
                } catch (error) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<i data-lucide="log-in" style="width: 18px; height: 18px;"></i> Sign In`;
                    lucide.createIcons();
                    
                    errorMsg.textContent = error.message || "An unexpected error occurred.";
                    alertBox.classList.add("visible");
                }
            };
        });
    </script>
</body>
</html>

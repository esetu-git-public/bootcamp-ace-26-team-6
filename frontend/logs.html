<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Compliance - Violations Log</title>
    <script src="js/auth-guard.js?v=12"></script>
    <link rel="stylesheet" href="css/style.css?v=12">

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Force clear stale sessions on page load
        try {
            const session = localStorage.getItem("ppe_session");
            if (session) {
                const parsed = JSON.parse(session);
                const payload = JSON.parse(atob(parsed.access_token.split('.')[1]));
                if (Date.now() >= payload.exp * 1000) {
                    localStorage.removeItem("ppe_session");
                }
            }
        } catch (e) {
            localStorage.removeItem("ppe_session");
        }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-icon">
                    <i data-lucide="shield-alert" style="width: 22px; height: 22px;"></i>
                </div>
                <div class="logo-text">PPE Sentry</div>
            </div>
            
<nav>
                <ul class="nav-links">
                    <li class="nav-item">
                        <a href="index.html">
                            <i data-lucide="layout-dashboard"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="logs.html">
                            <i data-lucide="clipboard-list"></i>
                            Violation Log
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="reports.html">
                            <i data-lucide="bar-chart-3"></i>
                            Reports
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="history.html">
                            <i data-lucide="calendar"></i>
                            History
                        </a>
                    </li>

                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div id="supabase-status-badge" class="supabase-badge" style="margin-bottom: 0.75rem;">
                    <span class="indicator"></span>
                    <span id="supabase-status-label">Checking...</span>
                </div>
                
                <!-- User Profile Card -->
                <div class="sidebar-profile">
                    <div class="profile-avatar" id="user-avatar">??</div>
                    <div class="profile-details">
                        <span class="profile-name" id="user-display-name">Username</span>
                    </div>
                    <button class="logout-icon-btn" id="logout-btn" title="Sign Out">
                        <i data-lucide="log-out" style="width: 15px; height: 15px;"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content Panel -->
        <main class="main-content">
            <!-- Header Bar -->
            <header class="header-bar">
                <div class="page-title">
                    <h1>Violations & Detections Log</h1>
                    <p>Browse, filter, and audit site compliance history</p>
                </div>
                <div class="header-actions">
                    <button id="export-csv-btn" class="btn btn-outline">
                        <i data-lucide="download"></i>
                        Export CSV
                    </button>
                </div>
            </header>

            <!-- Filters Bar Panel -->
            <section class="filter-bar" style="grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)) auto;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Event Type</label>
                    <select id="filter-type" class="form-select">
                        <option value="all">All Events</option>
                        <option value="Violations Only">Violations Only</option>
                        <option value="Compliant">Compliant Only</option>
                        <option value="Fall-Detected">Fall Detected</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Start Date</label>
                    <input type="date" id="filter-date-start" class="form-input">
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">End Date</label>
                    <input type="date" id="filter-date-end" class="form-input">
                </div>

                <button id="clear-filters-btn" class="btn btn-outline">
                    Clear Filters
                </button>
            </section>

            <!-- Logs Data Table panel -->
            <section class="panel">
                <div class="table-responsive">
                    <table class="custom-table" id="violations-log-table">
                        <thead>
                            <tr>
                                <th class="sortable sort-desc" data-column="created_at">Timestamp</th>
                                <th class="sortable" data-column="type">Event Type</th>
                                <th class="sortable" data-column="confidence">Confidence</th>
                                <th class="sortable" data-column="status">Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="logs-tbody">
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                                    Loading events...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Footer -->
                <div class="pagination-container">
                    <div id="pagination-info">Showing -- to -- of -- entries</div>
                    <div class="pagination-controls" id="pagination-controls">
                        <!-- Dynamic page links -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/supabase-db.js?v=15"></script>
    <script src="js/logs.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
